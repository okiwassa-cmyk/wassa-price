<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASSA WASSA 料金ツール</title>
<style>
:root {
  --ocean: #0a3d4a;
  --ocean-mid: #1a5f72;
  --ocean-light: #e8f4f7;
  --star: #f0c060;
  --sh: #c0392b; --sh-bg: #fdf0ee; --sh-border: #e8b4ae;
  --hi: #d4820a; --hi-bg: #fdf6e8; --hi-border: #f0c878;
  --re: #2d7a3a; --re-bg: #eef7f0; --re-border: #a8d8b0;
  --lo: #1a5f8a; --lo-bg: #eaf3fa; --lo-border: #90c4e0;
  --text: #1a2a30;
  --text-mid: #4a6470;
  --text-light: #8aa0a8;
  --border: #d0dde0;
  --bg: #f5f8f9;
  --white: #ffffff;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: var(--ocean); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
header h1 { color: var(--white); font-size: 15px; font-weight: 500; letter-spacing: 0.05em; }
header .star { color: var(--star); font-size: 18px; }
.tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tab { flex: 1; min-width: 80px; padding: 13px 8px; font-size: 13px; text-align: center; cursor: pointer; color: var(--text-mid); border-bottom: 2px solid transparent; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab.active { color: var(--ocean); border-bottom-color: var(--ocean); font-weight: 500; }
.panel { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }
.panel.active { display: block; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav button { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 16px; font-size: 15px; cursor: pointer; color: var(--text); }
.cal-nav h2 { font-size: 16px; font-weight: 500; color: var(--ocean); }
.legend { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
.badge.sh { background: var(--sh-bg); color: var(--sh); border: 1px solid var(--sh-border); }
.badge.hi { background: var(--hi-bg); color: var(--hi); border: 1px solid var(--hi-border); }
.badge.re { background: var(--re-bg); color: var(--re); border: 1px solid var(--re-border); }
.badge.lo { background: var(--lo-bg); color: var(--lo); border: 1px solid var(--lo-border); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-dow { text-align: center; font-size: 11px; color: var(--text-light); padding: 4px 0; font-weight: 500; }
.cal-day { border-radius: var(--radius-sm); min-height: 46px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
.cal-day .dn { font-size: 14px; font-weight: 500; color: var(--text); }
.cal-day .ds { font-size: 9px; font-weight: 500; }
.cal-day.sh-d { background: var(--sh-bg); } .cal-day.sh-d .dn { color: var(--sh); } .cal-day.sh-d .ds { color: var(--sh); }
.cal-day.hi-d { background: var(--hi-bg); } .cal-day.hi-d .dn { color: var(--hi); } .cal-day.hi-d .ds { color: var(--hi); }
.cal-day.re-d { background: var(--re-bg); } .cal-day.re-d .dn { color: var(--re); } .cal-day.re-d .ds { color: var(--re); }
.cal-day.lo-d { background: var(--lo-bg); } .cal-day.lo-d .dn { color: var(--lo); } .cal-day.lo-d .ds { color: var(--lo); }
.fr { margin-bottom: 12px; }
.fr label { display: block; font-size: 12px; color: var(--text-mid); margin-bottom: 5px; font-weight: 500; }
.fr select, .fr input[type=date] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; background: var(--white); color: var(--text); font-family: inherit; -webkit-appearance: none; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sdiv { font-size: 11px; font-weight: 500; color: var(--text-light); margin: 14px 0 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.meal-info { background: var(--ocean-light); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: var(--ocean-mid); margin-bottom: 14px; line-height: 1.7; }
.meal-info strong { color: var(--ocean); }
.btn-calc { width: 100%; padding: 13px; background: var(--ocean); color: var(--white); border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; letter-spacing: 0.05em; }
.btn-calc:active { opacity: 0.85; }
.result-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 14px; }
.result-title { font-size: 14px; font-weight: 500; color: var(--ocean); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); line-height: 1.6; }
.night-block { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--bg); }
.night-block:last-of-type { border-bottom: none; margin-bottom: 0; }
.night-header { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.detail-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-mid); padding: 2px 0 2px 10px; }
.subtotal-section { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; }
.subtotal-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-mid); padding: 3px 0; }
.total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: 500; color: var(--ocean); margin-top: 10px; padding-top: 10px; border-top: 2px solid var(--ocean-light); }
.err { font-size: 13px; color: var(--sh); margin-top: 10px; padding: 10px 12px; background: var(--sh-bg); border-radius: var(--radius-sm); }
.loading { font-size: 13px; color: var(--text-light); margin-top: 10px; text-align: center; padding: 20px; }
.section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.section-title { font-size: 13px; font-weight: 500; color: var(--ocean); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.opt-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--bg); font-size: 13px; gap: 12px; }
.opt-row:last-child { border: none; padding-bottom: 0; }
.opt-row label { color: var(--text-mid); flex: 1; line-height: 1.5; }
.opt-row input[type=number] { width: 100px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; text-align: right; font-family: inherit; color: var(--text); background: var(--white); flex-shrink: 0; }
.price-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.price-tbl th { text-align: left; padding: 6px 8px; color: var(--text-light); font-weight: 400; font-size: 11px; border-bottom: 1px solid var(--border); }
.price-tbl td { padding: 7px 8px; border-bottom: 1px solid var(--bg); color: var(--text-mid); font-size: 12px; }
.price-tbl input[type=number] { width: 90px; padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; text-align: right; font-family: inherit; color: var(--text); background: var(--white); }
.range-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; font-size: 13px; color: var(--text-mid); }
.range-row input[type=date] { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; color: var(--text); background: var(--white); -webkit-appearance: none; }
.add-range-btn { background: none; border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; cursor: pointer; color: var(--text-mid); font-family: inherit; margin-top: 4px; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 16px; padding: 0 4px; }
.save-btn { padding: 9px 20px; background: var(--ocean); color: var(--white); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 14px; }
.save-btn:active { opacity: 0.85; }
.saved-msg { font-size: 12px; color: var(--re); margin-left: 10px; opacity: 0; transition: opacity 0.3s; vertical-align: middle; }
.season-block { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--bg); }
.season-block:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }
.sub-label { font-size: 11px; color: var(--text-light); margin-bottom: 6px; font-weight: 500; }
.rate-note { font-size: 10px; color: var(--text-light); margin-top: 2px; }
.din-child-wrap { text-align: right; }
.din-child-wrap input { margin-bottom: 4px; }
.din-child-sub { font-size: 11px; color: var(--text-light); display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 4px; }
.din-child-sub input { width: 48px; padding: 4px 6px; }
.btn-quote { width: 100%; padding: 11px; background: var(--white); color: var(--ocean); border: 1.5px solid var(--ocean); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 10px; letter-spacing: 0.05em; }
.btn-quote:active { opacity: 0.8; }
.quote-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; padding: 20px 0; }
.quote-overlay.open { display: block; }
.quote-sheet { background: var(--white); max-width: 600px; margin: 0 auto; padding: 32px 28px; border-radius: var(--radius); }
.quote-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 2px solid var(--ocean); }
.quote-logo { color: var(--ocean); }
.quote-logo .name { font-size: 18px; font-weight: 500; letter-spacing: 0.08em; }
.quote-logo .sub { font-size: 11px; color: var(--text-mid); margin-top: 4px; line-height: 1.6; }
.quote-meta { text-align: right; font-size: 12px; color: var(--text-mid); line-height: 1.8; }
.quote-title { font-size: 20px; font-weight: 500; color: var(--ocean); text-align: center; margin-bottom: 24px; letter-spacing: 0.1em; }
.quote-to { margin-bottom: 20px; }
.quote-to .name-line { font-size: 18px; font-weight: 500; border-bottom: 1px solid var(--text); display: inline-block; min-width: 200px; padding-bottom: 2px; margin-right: 4px; }
.quote-to .sama { font-size: 14px; color: var(--text-mid); }
.quote-info { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 20px; }
.quote-info-row { display: flex; font-size: 13px; padding: 3px 0; }
.quote-info-row .ql { color: var(--text-mid); width: 100px; flex-shrink: 0; }
.quote-info-row .qv { color: var(--text); font-weight: 500; }
.quote-tbl { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
.quote-tbl th { background: var(--ocean); color: var(--white); padding: 8px 10px; text-align: left; font-weight: 500; font-size: 12px; }
.quote-tbl th:last-child { text-align: right; }
.quote-tbl td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text-mid); }
.quote-tbl td:last-child { text-align: right; color: var(--text); }
.quote-tbl tr.night-row td { background: var(--bg); font-weight: 500; color: var(--text); font-size: 12px; }
.quote-tbl tr.sub-row td { padding-left: 20px; font-size: 12px; }
.quote-tbl tr.subtotal-row td { border-top: 1px solid var(--border); font-weight: 500; color: var(--text); }
.quote-total { display: flex; justify-content: space-between; align-items: center; background: var(--ocean); color: var(--white); padding: 14px 16px; border-radius: var(--radius-sm); margin-bottom: 20px; }
.quote-total .label { font-size: 14px; font-weight: 500; }
.quote-total .amount { font-size: 22px; font-weight: 500; }
.quote-note { font-size: 12px; color: var(--text-mid); line-height: 1.8; margin-bottom: 20px; }
.quote-note p { margin-bottom: 4px; }
.quote-footer { text-align: center; font-size: 11px; color: var(--text-light); padding-top: 16px; border-top: 1px solid var(--border); line-height: 1.8; }
.quote-actions { display: flex; gap: 10px; margin-bottom: 16px; }
.quote-actions button { flex: 1; padding: 10px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-close-quote { background: var(--white); color: var(--text-mid); border: 1px solid var(--border); }
.btn-print-quote { background: var(--ocean); color: var(--white); border: none; }
.quote-guest-input { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding: 12px 16px; background: var(--ocean-light); border-radius: var(--radius-sm); }
.quote-guest-input label { font-size: 13px; color: var(--ocean-mid); white-space: nowrap; }
.quote-guest-input input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--text); background: var(--white); }
.quote-validity { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding: 12px 16px; background: var(--ocean-light); border-radius: var(--radius-sm); }
.quote-validity label { font-size: 13px; color: var(--ocean-mid); white-space: nowrap; }
.quote-validity input { width: 60px; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--text); background: var(--white); text-align: right; }
.quote-validity span { font-size: 13px; color: var(--ocean-mid); }
@media print {
  body > *:not(.quote-overlay) { display: none !important; }
  .quote-overlay { display: block !important; position: static; background: none; padding: 0; }
  .quote-sheet { box-shadow: none; border-radius: 0; }
  .quote-actions, .quote-guest-input, .quote-validity { display: none !important; }
}
</style>
</head>
<body>

<header>
  <span class="star">★</span>
  <h1>WASSA WASSA　料金ツール</h1>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('cal')">料金カレンダー</button>
  <button class="tab" onclick="showTab('est')">見積もり</button>
  <button class="tab" onclick="showTab('mgr')">料金設定</button>
</div>

<div id="tab-cal" class="panel active">
  <div class="legend">
    <span class="badge sh">Super High</span>
    <span class="badge hi">High</span>
    <span class="badge re">Regular</span>
    <span class="badge lo">Low</span>
  </div>
  <div class="cal-nav">
    <button onclick="moveMonth(-1)">‹</button>
    <h2 id="cal-title"></h2>
    <button onclick="moveMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid">
    <div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>
    <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow">土</div>
  </div>
</div>

<div id="tab-est" class="panel">
  <div class="fr">
    <label>部屋</label>
    <select id="e-room" onchange="onRoomChange()">
      <option value="sup">スーペリアツイン</option>
      <option value="dlx">デラックスツイン</option>
    </select>

  <div class="row2">
    <div class="fr"><label>チェックイン</label><input type="date" id="e-cin"></div>

  </div>

  <div class="row2">
    <div class="fr"><label>大人</label>
      <select id="e-adult">
        <option value="1">1名</option><option value="2" selected>2名</option>
        <option value="3">3名</option><option value="4">4名</option>
      </select>
    </div>

      <select id="e-child">
        <option value="0" selected>0名</option><option value="1">1名</option><option value="2">2名</option>
      </select>
    </div>
  </div>
  <div id="inf-sup" class="row2">
    <div class="fr"><label>幼児（布団あり）</label>
      <select id="e-inf-futon">
        <option value="0" selected>0名</option><option value="1">1名</option><option value="2">2名</option>
      </select>
    </div>
    <div class="fr"><label>幼児（布団なし）</label>
      <select id="e-inf-nofuton">
        <option value="0" selected>0名</option><option value="1">1名</option><option value="2">2名</option>
      </select>
    </div>
  </div>
  <div id="inf-dlx" class="fr" style="display:none">
    <label>幼児</label>
    <select id="e-inf-dlx">
      <option value="0" selected>0名</option><option value="1">1名</option><option value="2">2名</option>
    </select>

      <button class="btn-close-quote" onclick="closeQuote()">閉じる</button>
      <button class="btn-print-quote" onclick="window.print()">印刷 / PDF保存</button>
    </div>

      <input type="text" id="q-guest" placeholder="田中 太郎" oninput="updateQuoteGuest()">

      <label>有効期限</label>
      <input type="number" id="q-validity" value="7" min="1" max="90" oninput="updateQuoteValidity()">
      <span>日間有効</span>

    <div id="quote-content"></div>
  </div>
</div>

<script>
const SUPA_URL='https://mtsdhheqddrckksiqlim.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10c2RoaGVxZGRyY2trc2lxbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTc5NDgsImV4cCI6MjA4ODE3Mzk0OH0.c18ExSxNHBOani7CN4QAqaerhvpr5ZCYA0GGkUg0mlc';
const SEASONS=['super_high','high','regular','low'];
const SL={super_high:'Super High',high:'High',regular:'Regular',low:'Low'};
const SC={super_high:'sh',high:'hi',regular:'re',low:'lo'};
const SDC={super_high:'sh-d',high:'hi-d',regular:'re-d',low:'lo-d'};

let common={bf_adult:2200,bf_child:2200,bf_infant:2200,din_adult:7700,din_child_rate:0.65,din_child_price:null,din_infant:3300};
let prices={};
let ranges={super_high:[],high:[],regular:[],low:[]};
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();

async function supa(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SUPA_URL+'/rest/v1/'+path,opts);
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadData(){
  try{
    const[cm,pm,sr]=await Promise.all([
      supa('price_common?id=eq.1'),
      supa('price_master?select=*'),
      supa('season_ranges?select=*&order=from_date.asc')
    ]);
    if(cm.length){
      const c=cm[0];
      common={bf_adult:c.bf_adult,bf_child:c.bf_child,bf_infant:c.bf_infant,din_adult:c.din_adult,din_child_rate:parseFloat(c.din_child_rate),din_child_price:c.din_child_price||null,din_infant:c.din_infant};
    }
    prices={};
    for(const s of SEASONS) prices[s]={sup:{},dlx:{}};
    for(const row of pm){
      const p=prices[row.season]?.[row.room];
      if(!p) continue;
      if(row.pax_type==='adult') p[row.pax]=row.price;
      else if(row.pax_type==='child') p.child=row.price;
      else if(row.pax_type==='infant') p.infant=row.price;
      else if(row.pax_type==='infant_futon') p.infant_futon=row.price;
      else if(row.pax_type==='infant_no_futon') p.infant_no_futon=row.price;
    }
    ranges={super_high:[],high:[],regular:[],low:[]};
    for(const row of sr){
      if(!ranges[row.season]) ranges[row.season]=[];
      ranges[row.season].push({from:row.from_date,to:row.to_date,id:row.id});
    }
    updateMealInfo();renderCal();
  }catch(e){console.error(e);useFallback();}
}

function useFallback(){
  prices={
    super_high:{sup:{1:20900,2:17600,3:16500,4:15950,child:11440,infant_futon:4400,infant_no_futon:2200},dlx:{1:49500,2:28600,3:26400,4:24200,child:22880,infant:6600}},

function calcEstimate(){
  const room=document.getElementById('e-room').value;
  const cin=document.getElementById('e-cin').value;
  const cout=document.getElementById('e-cout').value;
  const adult=parseInt(document.getElementById('e-adult').value);
  const child=parseInt(document.getElementById('e-child').value);
  const infFuton=room==='sup'?parseInt(document.getElementById('e-inf-futon').value):0;
  const infNoFuton=room==='sup'?parseInt(document.getElementById('e-inf-nofuton').value):0;
  const infDlx=room==='dlx'?parseInt(document.getElementById('e-inf-dlx').value):0;
  const meal=document.getElementById('e-meal').value;
  const area=document.getElementById('result-area');
  if(!cin||!cout){area.innerHTML='<div class="err">日付を入力してください</div>';return;}
  const d1=new Date(cin),d2=new Date(cout);
  if(d2<=d1){area.innerHTML='<div class="err">チェックアウトはチェックインより後の日付にしてください</div>';return;}
  const nights=(d2-d1)/86400000;
  const hasBf=meal==='bf'||meal==='both';
  const hasDin=meal==='din'||meal==='both';
  const roomName=room==='sup'?'スーペリアツイン':'デラックスツイン';
  const dinChild=common.din_child_price||Math.round(common.din_adult*common.din_child_rate);
  const totalInf=room==='sup'?infFuton+infNoFuton:infDlx;

  let rows=[],totalRoom=0,totalBf=0,totalDin=0;
  for(let i=0;i<nights;i++){
    const dt=new Date(d1);dt.setDate(dt.getDate()+i);
    const ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    const label=(dt.getMonth()+1)+'/'+dt.getDate();
    const s=getSeasonForDate(ds)||'regular';
    const p=prices[s]?.[room]||{};
    const ak=Math.min(adult,4);
    const base=p[ak]||0;
    const childRoom=(p.child||0)*child;
    const infFutonRoom=room==='sup'?(p.infant_futon||4400)*infFuton:0;
    const infNoFutonRoom=room==='sup'?(p.infant_no_futon||2200)*infNoFuton:0;
    const infDlxRoom=room==='dlx'?(p.infant||0)*infDlx:0;
    const nightRoom=base+childRoom+infFutonRoom+infNoFutonRoom+infDlxRoom;
    const bfAmt=hasBf?(common.bf_adult*adult+common.bf_child*child+common.bf_infant*totalInf):0;
    const dinAmt=hasDin?(common.din_adult*adult+dinChild*child+common.din_infant*totalInf):0;
    totalRoom+=nightRoom;totalBf+=bfAmt;totalDin+=dinAmt;
    rows.push({label,s,base,childRoom,infFutonRoom,infNoFutonRoom,infDlxRoom,nightRoom,bfAmt,dinAmt,ak});
  }

  const grand=totalRoom+totalBf+totalDin;
  const mealLabel={none:'素泊まり',bf:'朝食付き',din:'夕食付き',both:'朝夕食付き'}[meal];
  let paxDesc='大人'+adult+'名';
  if(child)paxDesc+='・小学生'+child+'名';
  if(room==='sup'){if(infFuton)paxDesc+='・幼児(布団あり)'+infFuton+'名';if(infNoFuton)paxDesc+='・幼児(布団なし)'+infNoFuton+'名';}
  else{if(infDlx)paxDesc+='・幼児'+infDlx+'名';}

  let html='<div class="result-card">';
  html+='<div class="result-title">'+roomName+'　'+nights+'泊　'+mealLabel+'<br><span style="font-size:12px;font-weight:400;color:var(--text-mid)">'+paxDesc+'</span></div>';
  for(const r of rows){
    const dayTotal=r.nightRoom+r.bfAmt+r.dinAmt;
    html+='<div class="night-block">';
    html+='<div class="night-header"><span>'+r.label+'　<span class="badge '+SC[r.s]+'">'+SL[r.s]+'</span></span><span>'+fmt(dayTotal)+'</span></div>';
    html+='<div class="detail-row"><span>室料（大人'+r.ak+'名）</span><span>'+fmt(r.base)+'</span></div>';
    if(child&&r.childRoom)html+='<div class="detail-row"><span>室料（小学生'+child+'名）</span><span>'+fmt(r.childRoom)+'</span></div>';
    if(room==='sup'){
      if(infFuton&&r.infFutonRoom)html+='<div class="detail-row"><span>室料（幼児 布団あり '+infFuton+'名）</span><span>'+fmt(r.infFutonRoom)+'</span></div>';
      if(infNoFuton&&r.infNoFutonRoom)html+='<div class="detail-row"><span>室料（幼児 布団なし '+infNoFuton+'名）</span><span>'+fmt(r.infNoFutonRoom)+'</span></div>';
    }else{
      if(infDlx&&r.infDlxRoom)html+='<div class="detail-row"><span>室料（幼児'+infDlx+'名）</span><span>'+fmt(r.infDlxRoom)+'</span></div>';
    }
    if(r.bfAmt)html+='<div class="detail-row"><span>朝食（'+(adult+child+totalInf)+'名）</span><span>'+fmt(r.bfAmt)+'</span></div>';
    if(r.dinAmt){let dl='夕食　大人'+adult+'名';if(child)dl+='・小学生'+child+'名';if(totalInf)dl+='・幼児'+totalInf+'名';html+='<div class="detail-row"><span>'+dl+'</span><span>'+fmt(r.dinAmt)+'</span></div>';}
    html+='</div>';
  }
  if(nights>1){
    html+='<div class="subtotal-section">';
    html+='<div class="subtotal-row"><span>室料小計</span><span>'+fmt(totalRoom)+'</span></div>';
    if(totalBf)html+='<div class="subtotal-row"><span>朝食小計</span><span>'+fmt(totalBf)+'</span></div>';
    if(totalDin)html+='<div class="subtotal-row"><span>夕食小計</span><span>'+fmt(totalDin)+'</span></div>';
    html+='</div>';
  }
  html+='<div class="total-row"><span>合計</span><span>'+fmt(grand)+'</span></div></div>';
  html+='<button class="btn-quote" onclick="openQuote()">見積もり書を表示</button>';
  area.innerHTML=html;
  lastEstimate={room,roomName,cin,cout,nights,adult,child,infFuton,infNoFuton,infDlx,totalInf,meal,mealLabel,paxDesc,rows,totalRoom,totalBf,totalDin,grand,hasBf,hasDin,dinChild};
}

async function saveCommon(){
  const cpVal=document.getElementById('c-din-child-price').value;
  common.bf_adult=parseInt(document.getElementById('c-bf-adult').value)||0;
  common.bf_child=parseInt(document.getElementById('c-bf-child').value)||0;
  common.bf_infant=parseInt(document.getElementById('c-bf-infant').value)||0;
  common.din_adult=parseInt(document.getElementById('c-din-adult').value)||0;
  common.din_child_rate=(parseInt(document.getElementById('c-din-rate').value)||0)/100;
  common.din_child_price=cpVal?parseInt(cpVal):null;
  common.din_infant=parseInt(document.getElementById('c-din-infant').value)||0;
  try{
    await supa('price_common?id=eq.1','PATCH',{bf_adult:common.bf_adult,bf_child:common.bf_child,bf_infant:common.bf_infant,din_adult:common.din_adult,din_child_rate:common.din_child_rate,din_child_price:common.din_child_price,din_infant:common.din_infant,updated_at:new Date().toISOString()});
    showMsg('msg-common');renderMgr();
  }catch(e){alert('保存に失敗しました: '+e.message);}
}

async function saveSeason(s){
  try{
    const p=prices[s];const rows=[];
    for(const room of['sup','dlx']){
      const rp=p[room]||{};
      for(const k of[1,2,3,4])if(rp[k]!==undefined)rows.push({season:s,room,pax:k,pax_type:'adult',price:rp[k]});
      if(rp.child!==undefined)rows.push({season:s,room,pax:null,pax_type:'child',price:rp.child});
      if(room==='sup'){
        if(rp.infant_futon!==undefined)rows.push({season:s,room,pax:null,pax_type:'infant_futon',price:rp.infant_futon});
        if(rp.infant_no_futon!==undefined)rows.push({season:s,room,pax:null,pax_type:'infant_no_futon',price:rp.infant_no_futon});
      }else{
        if(rp.infant!==undefined)rows.push({season:s,room,pax:null,pax_type:'infant',price:rp.infant});
      }
    }
    await supa('price_master?season=eq.'+s,'DELETE');
    if(rows.length)await supa('price_master','POST',rows);
    showMsg('msg-'+s);
  }catch(e){alert('保存に失敗しました: '+e.message);}
}

function showMsg(id){const el=document.getElementById(id);if(!el)return;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2500);}
function updatePrice(s,room,key,val){if(!prices[s])prices[s]={sup:{},dlx:{}};if(!prices[s][room])prices[s][room]={};prices[s][room][key]=parseInt(val)||0;}
function updateRange(s,i,field,val){if(!ranges[s])ranges[s]=[];ranges[s][i][field]=val;renderCal();}
function addRange(s){if(!ranges[s])ranges[s]=[];ranges[s].push({from:'',to:''});renderMgr();}

async function delRange(s,i){
  const r=ranges[s][i];
  if(r.id){
    try{ await supa('season_ranges?id=eq.'+r.id,'DELETE'); }catch(e){alert('削除に失敗しました: '+e.message);return;}
  }
  ranges[s].splice(i,1);
  renderMgr();renderCal();
}

async function saveRanges(s){
  try{
    const toSave=ranges[s].filter(r=>r.from&&r.to);
    for(const r of toSave){
      if(r.id){
        await supa('season_ranges?id=eq.'+r.id,'PATCH',{season:s,from_date:r.from,to_date:r.to});
      } else {
        const res=await supa('season_ranges','POST',{season:s,from_date:r.from,to_date:r.to});
        if(res.length) r.id=res[0].id;
      }
    }
    showMsg('msg-ranges-'+s);
    renderCal();
  }catch(e){alert('保存に失敗しました: '+e.message);}
}
